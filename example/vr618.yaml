esphome:
  name: allbot-vr618
  friendly_name: ALLBOT VR618

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ../components
    components: [allbot]

# VR618 has 18 servos — two PCA9685 boards (0x40 and 0x41, A0 jumper on the second).
i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 400kHz

pca9685:
  - id: pca_a
    address: 0x40
    frequency: 50Hz
  - id: pca_b
    address: 0x41
    frequency: 50Hz

output:
  - platform: ledc
    id: buzzer_out
    pin: GPIO13
    frequency: 1000Hz
  # Board A: hips + knees (12 servos)
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_hip_fl,  channel: 0}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_hip_fr,  channel: 1}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_hip_ml,  channel: 2}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_hip_mr,  channel: 3}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_hip_rl,  channel: 4}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_hip_rr,  channel: 5}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_knee_fl, channel: 6}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_knee_fr, channel: 7}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_knee_ml, channel: 8}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_knee_mr, channel: 9}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_knee_rl, channel: 10}
  - {platform: pca9685, pca9685_id: pca_a, id: pwm_knee_rr, channel: 11}
  # Board B: ankles (6 servos)
  - {platform: pca9685, pca9685_id: pca_b, id: pwm_ankle_fl, channel: 0}
  - {platform: pca9685, pca9685_id: pca_b, id: pwm_ankle_fr, channel: 1}
  - {platform: pca9685, pca9685_id: pca_b, id: pwm_ankle_ml, channel: 2}
  - {platform: pca9685, pca9685_id: pca_b, id: pwm_ankle_mr, channel: 3}
  - {platform: pca9685, pca9685_id: pca_b, id: pwm_ankle_rl, channel: 4}
  - {platform: pca9685, pca9685_id: pca_b, id: pwm_ankle_rr, channel: 5}

rtttl:
  id: buzzer
  output: buzzer_out

allbot:
  id: bot
  servos:
    - {id: hip_fl,    output: pwm_hip_fl,    initial_angle: 45,  flipped: false}
    - {id: hip_fr,    output: pwm_hip_fr,    initial_angle: 45,  flipped: true}
    - {id: hip_ml,    output: pwm_hip_ml,    initial_angle: 90,  flipped: false}
    - {id: hip_mr,    output: pwm_hip_mr,    initial_angle: 90,  flipped: true}
    - {id: hip_rl,    output: pwm_hip_rl,    initial_angle: 45,  flipped: true}
    - {id: hip_rr,    output: pwm_hip_rr,    initial_angle: 45,  flipped: false}
    - {id: knee_fl,   output: pwm_knee_fl,   initial_angle: 135, flipped: false}
    - {id: knee_fr,   output: pwm_knee_fr,   initial_angle: 135, flipped: true}
    - {id: knee_ml,   output: pwm_knee_ml,   initial_angle: 135, flipped: false}
    - {id: knee_mr,   output: pwm_knee_mr,   initial_angle: 135, flipped: true}
    - {id: knee_rl,   output: pwm_knee_rl,   initial_angle: 135, flipped: false}
    - {id: knee_rr,   output: pwm_knee_rr,   initial_angle: 135, flipped: true}
    - {id: ankle_fl,  output: pwm_ankle_fl,  initial_angle: 0,   flipped: true}
    - {id: ankle_fr,  output: pwm_ankle_fr,  initial_angle: 0,   flipped: false}
    - {id: ankle_ml,  output: pwm_ankle_ml,  initial_angle: 0,   flipped: true}
    - {id: ankle_mr,  output: pwm_ankle_mr,  initial_angle: 0,   flipped: false}
    - {id: ankle_rl,  output: pwm_ankle_rl,  initial_angle: 0,   flipped: true}
    - {id: ankle_rr,  output: pwm_ankle_rr,  initial_angle: 0,   flipped: false}
  actions:
    standup:
      - duration: 200ms
        moves:
          - {servo: knee_fl, angle: 100}
          - {servo: knee_fr, angle: 100}
          - {servo: knee_ml, angle: 100}
          - {servo: knee_mr, angle: 100}
          - {servo: knee_rl, angle: 100}
          - {servo: knee_rr, angle: 100}

    # Tripod gait: alternate 3a = {front_right, rear_right, middle_left} with
    # 3b = {front_left, rear_left, middle_right}. One YAML call = intro + 1 cycle + outro.
    walk_forward:
      # intro: lift 3a
      - duration: 100ms
        moves: [{servo: knee_fr, angle: 130}, {servo: knee_rr, angle: 130}, {servo: knee_ml, angle: 130}]
      - duration: 100ms
        moves: [{servo: hip_fr, angle: 20}, {servo: hip_rr, angle: 70}, {servo: hip_ml, angle: 65}]
      # drop 3a + ankles
      - duration: 100ms
        moves:
          - {servo: knee_fr, angle: 70}
          - {servo: knee_rr, angle: 70}
          - {servo: knee_ml, angle: 70}
          - {servo: ankle_fr, angle: 20}
          - {servo: ankle_rr, angle: 20}
          - {servo: ankle_ml, angle: 20}
      # center 3a hips, lift 3b
      - duration: 100ms
        moves:
          - {servo: hip_fr, angle: 45}
          - {servo: hip_rr, angle: 45}
          - {servo: hip_ml, angle: 90}
          - {servo: knee_fl, angle: 130}
          - {servo: knee_rl, angle: 130}
          - {servo: knee_mr, angle: 130}
      # normalize 3a, swivel 3b forward
      - duration: 100ms
        moves:
          - {servo: knee_fr, angle: 100}
          - {servo: knee_rr, angle: 100}
          - {servo: knee_ml, angle: 100}
          - {servo: ankle_fr, angle: 0}
          - {servo: ankle_rr, angle: 0}
          - {servo: ankle_ml, angle: 0}
          - {servo: hip_fl, angle: 20}
          - {servo: hip_rl, angle: 70}
          - {servo: hip_mr, angle: 65}
      # drop 3b + ankles
      - duration: 100ms
        moves:
          - {servo: knee_fl, angle: 70}
          - {servo: knee_rl, angle: 70}
          - {servo: knee_mr, angle: 70}
          - {servo: ankle_fl, angle: 20}
          - {servo: ankle_rl, angle: 20}
          - {servo: ankle_mr, angle: 20}
      # center 3b hips
      - duration: 100ms
        moves:
          - {servo: hip_fl, angle: 45}
          - {servo: hip_rl, angle: 45}
          - {servo: hip_mr, angle: 90}
      # outro: normalize 3b
      - duration: 100ms
        moves:
          - {servo: knee_fl, angle: 100}
          - {servo: knee_rl, angle: 100}
          - {servo: knee_mr, angle: 100}
          - {servo: ankle_fl, angle: 0}
          - {servo: ankle_rl, angle: 0}
          - {servo: ankle_mr, angle: 0}

    walk_backward:
      - duration: 100ms
        moves: [{servo: knee_fr, angle: 130}, {servo: knee_rr, angle: 130}, {servo: knee_ml, angle: 130}]
      - duration: 100ms
        moves: [{servo: hip_fr, angle: 70}, {servo: hip_rr, angle: 20}, {servo: hip_ml, angle: 115}]
      - duration: 100ms
        moves:
          - {servo: knee_fr, angle: 70}
          - {servo: knee_rr, angle: 70}
          - {servo: knee_ml, angle: 70}
          - {servo: ankle_fr, angle: 20}
          - {servo: ankle_rr, angle: 20}
          - {servo: ankle_ml, angle: 20}
      - duration: 100ms
        moves:
          - {servo: hip_fr, angle: 45}
          - {servo: hip_rr, angle: 45}
          - {servo: hip_ml, angle: 90}
          - {servo: knee_fl, angle: 130}
          - {servo: knee_rl, angle: 130}
          - {servo: knee_mr, angle: 130}
      - duration: 100ms
        moves:
          - {servo: knee_fr, angle: 100}
          - {servo: knee_rr, angle: 100}
          - {servo: knee_ml, angle: 100}
          - {servo: ankle_fr, angle: 0}
          - {servo: ankle_rr, angle: 0}
          - {servo: ankle_ml, angle: 0}
          - {servo: hip_fl, angle: 70}
          - {servo: hip_rl, angle: 20}
          - {servo: hip_mr, angle: 115}
      - duration: 100ms
        moves:
          - {servo: knee_fl, angle: 70}
          - {servo: knee_rl, angle: 70}
          - {servo: knee_mr, angle: 70}
          - {servo: ankle_fl, angle: 20}
          - {servo: ankle_rl, angle: 20}
          - {servo: ankle_mr, angle: 20}
      - duration: 100ms
        moves:
          - {servo: hip_fl, angle: 45}
          - {servo: hip_rl, angle: 45}
          - {servo: hip_mr, angle: 90}
      - duration: 100ms
        moves:
          - {servo: knee_fl, angle: 100}
          - {servo: knee_rl, angle: 100}
          - {servo: knee_mr, angle: 100}
          - {servo: ankle_fl, angle: 0}
          - {servo: ankle_rl, angle: 0}
          - {servo: ankle_mr, angle: 0}

    turn_left:
      - duration: 100ms
        moves: [{servo: knee_fr, angle: 130}, {servo: knee_rr, angle: 130}, {servo: knee_ml, angle: 130}]
      - duration: 100ms
        moves: [{servo: hip_fr, angle: 20}, {servo: hip_rr, angle: 70}, {servo: hip_ml, angle: 115}]
      - duration: 100ms
        moves: [{servo: knee_fr, angle: 100}, {servo: knee_rr, angle: 100}, {servo: knee_ml, angle: 100}]
      - duration: 100ms
        moves: [{servo: knee_fl, angle: 130}, {servo: knee_rl, angle: 130}, {servo: knee_mr, angle: 130}]
      - duration: 100ms
        moves: [{servo: hip_fl, angle: 70}, {servo: hip_rl, angle: 20}, {servo: hip_mr, angle: 65}]
      - duration: 100ms
        moves: [{servo: knee_fl, angle: 100}, {servo: knee_rl, angle: 100}, {servo: knee_mr, angle: 100}]
      - duration: 100ms
        moves:
          - {servo: hip_fr, angle: 45}
          - {servo: hip_rr, angle: 45}
          - {servo: hip_ml, angle: 90}
          - {servo: hip_fl, angle: 45}
          - {servo: hip_rl, angle: 45}
          - {servo: hip_mr, angle: 90}

    turn_right:
      - duration: 100ms
        moves: [{servo: knee_fr, angle: 130}, {servo: knee_rr, angle: 130}, {servo: knee_ml, angle: 130}]
      - duration: 100ms
        moves: [{servo: hip_fr, angle: 70}, {servo: hip_rr, angle: 20}, {servo: hip_ml, angle: 65}]
      - duration: 100ms
        moves: [{servo: knee_fr, angle: 100}, {servo: knee_rr, angle: 100}, {servo: knee_ml, angle: 100}]
      - duration: 100ms
        moves: [{servo: knee_fl, angle: 130}, {servo: knee_rl, angle: 130}, {servo: knee_mr, angle: 130}]
      - duration: 100ms
        moves: [{servo: hip_fl, angle: 20}, {servo: hip_rl, angle: 70}, {servo: hip_mr, angle: 115}]
      - duration: 100ms
        moves: [{servo: knee_fl, angle: 100}, {servo: knee_rl, angle: 100}, {servo: knee_mr, angle: 100}]
      - duration: 100ms
        moves:
          - {servo: hip_fr, angle: 45}
          - {servo: hip_rr, angle: 45}
          - {servo: hip_ml, angle: 90}
          - {servo: hip_fl, angle: 45}
          - {servo: hip_rl, angle: 45}
          - {servo: hip_mr, angle: 90}

    lean_forward:
      - duration: 200ms
        moves:
          - {servo: knee_rl, angle: 50}
          - {servo: knee_rr, angle: 50}
          - {servo: ankle_rl, angle: 80}
          - {servo: ankle_rr, angle: 80}
          - {servo: knee_fl, angle: 135}
          - {servo: knee_fr, angle: 135}
          - {servo: ankle_fl, angle: 0}
          - {servo: ankle_fr, angle: 0}
          - {servo: knee_ml, angle: 110}
          - {servo: knee_mr, angle: 110}
      - duration: 200ms
        moves:
          - {servo: knee_fl, angle: 100}
          - {servo: knee_fr, angle: 100}
          - {servo: ankle_fl, angle: 0}
          - {servo: ankle_fr, angle: 0}
          - {servo: knee_rl, angle: 100}
          - {servo: knee_rr, angle: 100}
          - {servo: ankle_rl, angle: 0}
          - {servo: ankle_rr, angle: 0}
          - {servo: knee_ml, angle: 100}
          - {servo: knee_mr, angle: 100}

    lean_backward:
      - duration: 200ms
        moves:
          - {servo: knee_fl, angle: 50}
          - {servo: knee_fr, angle: 50}
          - {servo: ankle_fl, angle: 80}
          - {servo: ankle_fr, angle: 80}
          - {servo: knee_rl, angle: 135}
          - {servo: knee_rr, angle: 135}
          - {servo: ankle_rl, angle: 0}
          - {servo: ankle_rr, angle: 0}
          - {servo: knee_ml, angle: 110}
          - {servo: knee_mr, angle: 110}
      - duration: 200ms
        moves:
          - {servo: knee_fl, angle: 100}
          - {servo: knee_fr, angle: 100}
          - {servo: ankle_fl, angle: 0}
          - {servo: ankle_fr, angle: 0}
          - {servo: knee_rl, angle: 100}
          - {servo: knee_rr, angle: 100}
          - {servo: ankle_rl, angle: 0}
          - {servo: ankle_rr, angle: 0}
          - {servo: knee_ml, angle: 100}
          - {servo: knee_mr, angle: 100}

    lean_left:
      - duration: 200ms
        moves:
          - {servo: knee_fl, angle: 50}
          - {servo: knee_ml, angle: 50}
          - {servo: knee_rl, angle: 50}
          - {servo: ankle_fl, angle: 50}
          - {servo: ankle_ml, angle: 50}
          - {servo: ankle_rl, angle: 50}
          - {servo: knee_fr, angle: 150}
          - {servo: knee_mr, angle: 150}
          - {servo: knee_rr, angle: 150}
          - {servo: ankle_fr, angle: 0}
          - {servo: ankle_mr, angle: 0}
          - {servo: ankle_rr, angle: 0}
      - duration: 200ms
        moves:
          - {servo: knee_fl, angle: 100}
          - {servo: knee_ml, angle: 100}
          - {servo: knee_rl, angle: 100}
          - {servo: ankle_fl, angle: 0}
          - {servo: ankle_ml, angle: 0}
          - {servo: ankle_rl, angle: 0}
          - {servo: knee_fr, angle: 100}
          - {servo: knee_mr, angle: 100}
          - {servo: knee_rr, angle: 100}
          - {servo: ankle_fr, angle: 0}
          - {servo: ankle_mr, angle: 0}
          - {servo: ankle_rr, angle: 0}

    lean_right:
      - duration: 200ms
        moves:
          - {servo: knee_fr, angle: 50}
          - {servo: knee_mr, angle: 50}
          - {servo: knee_rr, angle: 50}
          - {servo: ankle_fr, angle: 50}
          - {servo: ankle_mr, angle: 50}
          - {servo: ankle_rr, angle: 50}
          - {servo: knee_fl, angle: 150}
          - {servo: knee_ml, angle: 150}
          - {servo: knee_rl, angle: 150}
          - {servo: ankle_fl, angle: 0}
          - {servo: ankle_ml, angle: 0}
          - {servo: ankle_rl, angle: 0}
      - duration: 200ms
        moves:
          - {servo: knee_fr, angle: 100}
          - {servo: knee_mr, angle: 100}
          - {servo: knee_rr, angle: 100}
          - {servo: ankle_fr, angle: 0}
          - {servo: ankle_mr, angle: 0}
          - {servo: ankle_rr, angle: 0}
          - {servo: knee_fl, angle: 100}
          - {servo: knee_ml, angle: 100}
          - {servo: knee_rl, angle: 100}
          - {servo: ankle_fl, angle: 0}
          - {servo: ankle_ml, angle: 0}
          - {servo: ankle_rl, angle: 0}

    wave_front_left:
      - duration: 100ms
        moves: [{servo: knee_fl, angle: 150}, {servo: ankle_fl, angle: 75}, {servo: hip_fl, angle: 10}]
      - duration: 50ms
        moves: [{servo: ankle_fl, angle: 45}]
      - duration: 50ms
        moves: [{servo: ankle_fl, angle: 90}]
      - duration: 50ms
        moves: [{servo: ankle_fl, angle: 45}]
      - duration: 65ms
        moves: [{servo: ankle_fl, angle: 90}]
      - duration: 65ms
        moves: [{servo: ankle_fl, angle: 45}]
      - duration: 100ms
        moves: [{servo: knee_fl, angle: 100}, {servo: ankle_fl, angle: 0}, {servo: hip_fl, angle: 45}]

    wave_front_right:
      - duration: 100ms
        moves: [{servo: knee_fr, angle: 150}, {servo: ankle_fr, angle: 75}, {servo: hip_fr, angle: 10}]
      - duration: 50ms
        moves: [{servo: ankle_fr, angle: 45}]
      - duration: 50ms
        moves: [{servo: ankle_fr, angle: 90}]
      - duration: 50ms
        moves: [{servo: ankle_fr, angle: 45}]
      - duration: 65ms
        moves: [{servo: ankle_fr, angle: 90}]
      - duration: 65ms
        moves: [{servo: ankle_fr, angle: 45}]
      - duration: 100ms
        moves: [{servo: knee_fr, angle: 100}, {servo: ankle_fr, angle: 0}, {servo: hip_fr, angle: 45}]

    wave_rear_left:
      - duration: 100ms
        moves: [{servo: knee_rl, angle: 150}, {servo: ankle_rl, angle: 75}, {servo: hip_rl, angle: 10}]
      - duration: 50ms
        moves: [{servo: ankle_rl, angle: 45}]
      - duration: 50ms
        moves: [{servo: ankle_rl, angle: 90}]
      - duration: 50ms
        moves: [{servo: ankle_rl, angle: 45}]
      - duration: 65ms
        moves: [{servo: ankle_rl, angle: 90}]
      - duration: 65ms
        moves: [{servo: ankle_rl, angle: 45}]
      - duration: 100ms
        moves: [{servo: knee_rl, angle: 100}, {servo: ankle_rl, angle: 0}, {servo: hip_rl, angle: 45}]

    wave_rear_right:
      - duration: 100ms
        moves: [{servo: knee_rr, angle: 150}, {servo: ankle_rr, angle: 75}, {servo: hip_rr, angle: 10}]
      - duration: 50ms
        moves: [{servo: ankle_rr, angle: 45}]
      - duration: 50ms
        moves: [{servo: ankle_rr, angle: 90}]
      - duration: 50ms
        moves: [{servo: ankle_rr, angle: 45}]
      - duration: 65ms
        moves: [{servo: ankle_rr, angle: 90}]
      - duration: 65ms
        moves: [{servo: ankle_rr, angle: 45}]
      - duration: 100ms
        moves: [{servo: knee_rr, angle: 100}, {servo: ankle_rr, angle: 0}, {servo: hip_rr, angle: 45}]

api:
  actions:
    - action: standup
      then: [allbot.run_action: {id: bot, action: standup}]
    - action: walk_forward
      then: [allbot.run_action: {id: bot, action: walk_forward}]
    - action: walk_backward
      then: [allbot.run_action: {id: bot, action: walk_backward}]
    - action: turn_left
      then: [allbot.run_action: {id: bot, action: turn_left}]
    - action: turn_right
      then: [allbot.run_action: {id: bot, action: turn_right}]
    - action: lean_forward
      then: [allbot.run_action: {id: bot, action: lean_forward}]
    - action: lean_backward
      then: [allbot.run_action: {id: bot, action: lean_backward}]
    - action: lean_left
      then: [allbot.run_action: {id: bot, action: lean_left}]
    - action: lean_right
      then: [allbot.run_action: {id: bot, action: lean_right}]
    - action: wave_front_left
      then: [allbot.run_action: {id: bot, action: wave_front_left}]
    - action: wave_front_right
      then: [allbot.run_action: {id: bot, action: wave_front_right}]
    - action: wave_rear_left
      then: [allbot.run_action: {id: bot, action: wave_rear_left}]
    - action: wave_rear_right
      then: [allbot.run_action: {id: bot, action: wave_rear_right}]
    - action: chirp
      then:
        - rtttl.play: {rtttl: "chirp:d=32,o=7,b=180:c,c,c"}
    - action: stop
      then:
        - allbot.stop: {id: bot}
        - rtttl.stop:
